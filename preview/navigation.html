<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation - papyrai-ui</title>
  <link rel="stylesheet" href="../src/core/styles.css">
  <style>
    body { font-family: var(--font-serif); background: var(--paper-white); color: var(--ink-black); margin: 0; padding: 20px; }
    h1 { font-family: var(--font-handwrite); margin: 8px 0 16px; }
    .back { color: var(--accent-red); text-decoration: none; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 12px; margin-top: 16px; }
  </style>
</head>
<body>
  <a href="index.html" class="back">← 返回首页</a>
  <h1>Navigation</h1>
  <p>已接入 10 个组件示例（点击或回车可触发切换状态）。</p>
  <div class="grid">
    <p-bottom-tabs label="bottom-tabs"></p-bottom-tabs>
    <p-command-palette label="command-palette"></p-command-palette>
    <p-dock label="dock"></p-dock>
    <p-pagination label="pagination"></p-pagination>
    <p-progress label="progress"></p-progress>
    <p-scroll-spy label="scroll-spy"></p-scroll-spy>
    <p-scroll-top label="scroll-top"></p-scroll-top>
    <p-steps label="steps"></p-steps>
    <p-tabs label="tabs"></p-tabs>
    <p-vertical-nav label="vertical-nav"></p-vertical-nav>
  </div>
  <script type="module" src="../src/index.js"></script>
</body>
</html>
