<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inputs - papyrai-ui</title>
  <link rel="stylesheet" href="../src/core/styles.css">
  <style>
    body { font-family: var(--font-serif); background: var(--paper-white); color: var(--ink-black); margin: 0; padding: 20px; }
    h1 { font-family: var(--font-handwrite); margin: 8px 0 16px; }
    .back { color: var(--accent-red); text-decoration: none; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 12px; margin-top: 16px; }
  </style>
</head>
<body>
  <a href="index.html" class="back">← 返回首页</a>
  <h1>Inputs</h1>
  <p>已接入 20 个组件示例（点击或回车可触发切换状态）。</p>
  <div class="grid">
    <p-auto-complete label="auto-complete"></p-auto-complete>
    <p-color-picker label="color-picker"></p-color-picker>
    <p-input-chips label="input-chips"></p-input-chips>
    <p-otp-input label="otp-input"></p-otp-input>
    <p-date-picker label="date-picker"></p-date-picker>
    <p-rich-text-editor label="rich-text-editor"></p-rich-text-editor>
    <p-input label="input"></p-input>
    <p-input-mask label="input-mask"></p-input-mask>
    <p-knob label="knob"></p-knob>
    <p-password-indicator label="password-indicator"></p-password-indicator>
    <p-textarea label="textarea"></p-textarea>
    <p-select label="select"></p-select>
    <p-swap label="swap"></p-swap>
    <p-signature-pad label="signature-pad"></p-signature-pad>
    <p-checkbox label="checkbox"></p-checkbox>
    <p-radio label="radio"></p-radio>
    <p-toggle label="toggle"></p-toggle>
    <p-range label="range"></p-range>
    <p-rating label="rating"></p-rating>
    <p-file-input label="file-input"></p-file-input>
  </div>
  <script type="module" src="../src/index.js"></script>
</body>
</html>
