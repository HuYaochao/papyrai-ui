<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data - papyrai-ui</title>
  <link rel="stylesheet" href="../src/core/styles.css">
  <style>
    body { font-family: var(--font-serif); background: var(--paper-white); color: var(--ink-black); margin: 0; padding: 20px; }
    h1 { font-family: var(--font-handwrite); margin: 8px 0 16px; }
    .back { color: var(--accent-red); text-decoration: none; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 12px; margin-top: 16px; }
  </style>
</head>
<body>
  <a href="index.html" class="back">← 返回首页</a>
  <h1>Data</h1>
  <p>已接入 6 个组件示例（点击或回车可触发切换状态）。</p>
  <div class="grid">
    <p-table label="table"></p-table>
    <p-calendar label="calendar"></p-calendar>
    <p-order-list label="order-list"></p-order-list>
    <p-tree label="tree"></p-tree>
    <p-pick-list label="pick-list"></p-pick-list>
    <p-virtual-scroller label="virtual-scroller"></p-virtual-scroller>
  </div>
  <script type="module" src="../src/index.js"></script>

</html>
